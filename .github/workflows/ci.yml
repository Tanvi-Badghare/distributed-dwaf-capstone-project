name: DWAF CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ------------------------
      # Python Lint
      # ------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install flake8
        run: pip install flake8

      -  name: Python Lint
         run: flake8 ml-detector/ taxii-server/ --max-line-length=120 --ignore=E501,E221,E226,E241,E231,E225,E402,E401,E702,F401,F541,W292,E999,F841,E272,W504

      # ------------------------
      # Rust Lint
      # ------------------------
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zkp-layer/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('zkp-layer/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Format Check
        working-directory: zkp-layer
        run: cargo fmt -- --check

      - name: Rust Clippy
        working-directory: zkp-layer
        run: cargo clippy -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # ------------------------
      # Python Tests
      # ------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          pip install -r ml-detector/requirements.txt
          pip install -r taxii-server/requirements.txt
          pip install pytest

      - name: Run Python Tests
        run: pytest tests/unit/

      # ------------------------
      # Rust Tests
      # ------------------------
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zkp-layer/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('zkp-layer/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust Tests
        working-directory: zkp-layer
        run: cargo test --all

  build-images:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ZKP Layer
        uses: docker/build-push-action@v5
        with:
          context: ./zkp-layer
          file: ./zkp-layer/Dockerfile
          push: false
          tags: dwaf-zkp:test

      - name: Build ML Detector
        uses: docker/build-push-action@v5
        with:
          context: ./ml-detector
          file: ./ml-detector/Dockerfile
          push: false
          tags: dwaf-ml:test

      - name: Build TAXII Server
        uses: docker/build-push-action@v5
        with:
          context: ./taxii-server
          file: ./taxii-server/Dockerfile
          push: false
          tags: dwaf-taxii:test

      - name: Build Orchestrator
        uses: docker/build-push-action@v5
        with:
          context: ./orchestrator
          file: ./orchestrator/Dockerfile
          push: false
          tags: dwaf-orchestrator:test

      - name: Build Validator Network
        uses: docker/build-push-action@v5
        with:
          context: ./validator-network
          file: ./validator-network/Dockerfile
          push: false
          tags: dwaf-validator:test

      