version: "3.9"

services:

  # ===============================
  # ZKP Layer
  # ===============================
  zkp-layer:
    build:
      context: ./zkp-layer
    container_name: waf-zkp
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 8080
    volumes:
      - ./zkp-layer/params:/app/params:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - waf-network

  # ===============================
  # Consensus Nodes (BFT)
  # ===============================

  consensus-node0:
    build: ./consensus
    container_name: waf-consensus-node0
    ports:
      - "8081:8081"
      - "26656:26656"
      - "26657:26657"
    environment:
      NODE_ID: node0
      CONSENSUS_NODES: 4
    volumes:
      - ./consensus/config:/app/config:ro
      - consensus-node0-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - waf-network

  consensus-node1:
    build: ./consensus
    container_name: waf-consensus-node1
    ports:
      - "8181:8081"
    environment:
      NODE_ID: node1
      CONSENSUS_NODES: 4
    volumes:
      - ./consensus/config:/app/config:ro
      - consensus-node1-data:/app/data
    depends_on:
      - consensus-node0
    restart: unless-stopped
    networks:
      - waf-network

  consensus-node2:
    build: ./consensus
    container_name: waf-consensus-node2
    ports:
      - "8281:8081"
    environment:
      NODE_ID: node2
      CONSENSUS_NODES: 4
    volumes:
      - ./consensus/config:/app/config:ro
      - consensus-node2-data:/app/data
    depends_on:
      - consensus-node0
    restart: unless-stopped
    networks:
      - waf-network

  consensus-node3:
    build: ./consensus
    container_name: waf-consensus-node3
    ports:
      - "8381:8081"
    environment:
      NODE_ID: node3
      CONSENSUS_NODES: 4
    volumes:
      - ./consensus/config:/app/config:ro
      - consensus-node3-data:/app/data
    depends_on:
      - consensus-node0
    restart: unless-stopped
    networks:
      - waf-network

  # ===============================
  # ML Detector
  # ===============================

  ml-detector:
    build: ./ml-detector
    container_name: waf-ml
    ports:
      - "8082:8082"
    environment:
      FLASK_ENV: production
      MODEL_PATH: /app/models
    volumes:
      - ./ml-detector/models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - waf-network

  # ===============================
  # TAXII Server
  # ===============================

  taxii-server:
    build: ./taxii-server
    container_name: waf-taxii
    ports:
      - "8083:8083"
    environment:
      FLASK_ENV: production
    volumes:
      - ./taxii-server/collections:/app/collections
      - taxii-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - waf-network

  # ===============================
  # Orchestrator (Integration Profile)
  # ===============================

  orchestrator:
    build: ./orchestrator
    container_name: waf-orchestrator
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      ML_DETECTOR_URL: http://ml-detector:8082
      ZKP_SERVICE_URL: http://zkp-layer:8080
      CONSENSUS_URL: http://consensus-node0:8081
      TAXII_URL: http://taxii-server:8083
    depends_on:
      - zkp-layer
      - consensus-node0
      - ml-detector
      - taxii-server
    restart: unless-stopped
    networks:
      - waf-network
    profiles:
      - integration

  # ===============================
  # Monitoring (Optional)
  # ===============================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - waf-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - waf-network
    profiles:
      - monitoring

# ===============================
# Networks
# ===============================

networks:
  waf-network:
    driver: bridge

# ===============================
# Volumes
# ===============================

volumes:
  consensus-node0-data:
  consensus-node1-data:
  consensus-node2-data:
  consensus-node3-data:
  taxii-data:
  prometheus-data:
  grafana-data:
