version: "3.9"

networks:
  dwaf-network:
    driver: bridge

volumes:
  ml-models:
  zkp-params:
  taxii-collections:
  waf-rules:

services:

  # ── Stage I: ML Detector ─────────────────────────────────────────────
  ml-detector:
    build: ./ml-detector
    container_name: dwaf-ml-detector
    ports:
      - "8000:8000"
    volumes:
      - ml-models:/app/models
    networks:
      - dwaf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Stage II: ZKP Layer ──────────────────────────────────────────────
  zkp-layer:
    build: ./zkp-layer
    container_name: dwaf-zkp-layer
    ports:
      - "8080:8080"
    volumes:
      - zkp-params:/app/params
    networks:
      - dwaf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Stage III: Validator Network ─────────────────────────────────────

  validator-0:
    build: ./validator-network
    container_name: dwaf-validator-0
    ports:
      - "9000:9000"
    environment:
      NODE_ID: 0
      PORT: 9000
      PEERS: validator-1:9001,validator-2:9002
      ZKP_LAYER_URL: http://zkp-layer:8080
    networks:
      - dwaf-network
    depends_on:
      zkp-layer:
        condition: service_healthy
    command: python app.py
    restart: unless-stopped

  validator-1:
    build: ./validator-network
    container_name: dwaf-validator-1
    ports:
      - "9001:9001"
    environment:
      NODE_ID: 1
      PORT: 9001
      PEERS: validator-0:9000,validator-2:9002
      ZKP_LAYER_URL: http://zkp-layer:8080
    networks:
      - dwaf-network
    depends_on:
      zkp-layer:
        condition: service_healthy
    command: python app.py
    restart: unless-stopped

  validator-2:
    build: ./validator-network
    container_name: dwaf-validator-2
    ports:
      - "9002:9002"
    environment:
      NODE_ID: 2
      PORT: 9002
      PEERS: validator-0:9000,validator-1:9001
      ZKP_LAYER_URL: http://zkp-layer:8080
    networks:
      - dwaf-network
    depends_on:
      zkp-layer:
        condition: service_healthy
    command: python app.py
    restart: unless-stopped

  # ── Stage IV: TAXII Server ───────────────────────────────────────────
  taxii-server:
    build: ./taxii-server
    container_name: dwaf-taxii-server
    ports:
      - "6000:8000"
    volumes:
      - taxii-collections:/app/collections
    networks:
      - dwaf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Stage V: Feedback Service ────────────────────────────────────────
  feedback-service:
    build: ./feedback-service
    container_name: dwaf-feedback-service
    ports:
      - "5000:5000"
    volumes:
      - waf-rules:/app/rules
    networks:
      - dwaf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Orchestrator ─────────────────────────────────────────────────────
  orchestrator:
    build: ./orchestrator
    container_name: dwaf-orchestrator
    ports:
      - "7000:7000"
    environment:
      ML_DETECTOR_URL: http://ml-detector:8000
      ZKP_LAYER_URL: http://zkp-layer:8080
      VALIDATOR_URLS: http://validator-0:9000,http://validator-1:9001,http://validator-2:9002
      TAXII_SERVER_URL: http://taxii-server:8000
      FEEDBACK_URL: http://feedback-service:5000
    networks:
      - dwaf-network
    depends_on:
      ml-detector:
        condition: service_healthy
      zkp-layer:
        condition: service_healthy
      taxii-server:
        condition: service_healthy
      feedback-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped