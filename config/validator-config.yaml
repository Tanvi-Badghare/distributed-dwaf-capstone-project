[node]
id = "node0"
listen_addr = "0.0.0.0:7000"
role = "validator"  # validator | observer | gateway

[network]
peers = [
  "node1:7000",
  "node2:7000",
  "node3:7000"
]

[consensus]
algorithm = "threshold-voting"
total_validators = 4
approval_threshold = 3

[timeouts]
verification_ms = 3000
vote_ms = 3000
commit_ms = 5000

[security]
enable_zkp_verification = true
require_signed_messages = true


