name: DWAF CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Python Lint
        run: flake8 ml-detector/ taxii-server/ --max-line-length=120 --ignore=E501

      # Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: Rust Format Check
        working-directory: zkp-layer
        run: cargo fmt -- --check

      - name: Rust Clippy
        working-directory: zkp-layer
        run: cargo clippy -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python Dependencies
        run: |
          pip install -r ml-detector/requirements.txt
          pip install -r taxii-server/requirements.txt
          pip install pytest

      - name: Run Python Tests
        run: pytest tests/unit/ || true

      # Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Run Rust Tests
        working-directory: zkp-layer
        run: cargo test

  build-images:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ZKP Layer
        uses: docker/build-push-action@v5
        with:
          context: ./zkp-layer
          file: ./zkp-layer/Dockerfile
          push: false
          tags: dwaf-zkp:test

      - name: Build ML Detector
        uses: docker/build-push-action@v5
        with:
          context: ./ml-detector
          file: ./ml-detector/Dockerfile
          push: false
          tags: dwaf-ml:test

      - name: Build TAXII Server
        uses: docker/build-push-action@v5
        with:
          context: ./taxii-server
          file: ./taxii-server/Dockerfile
          push: false
          tags: dwaf-taxii:test
